name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '7 6 * * 1'  # weekly, Monday 06:07 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install govulncheck
        # Pinned: x/vuln tracks the Go release cadence and @latest can pull
        # a version that requires a Go newer than this job's toolchain.
        # Bump in lockstep with the Go floor in go.mod / CONTRIBUTING.md.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck
        run: govulncheck ./...
