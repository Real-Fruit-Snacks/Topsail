version: 2
updates:
  # GitHub Actions only. The gomod ecosystem was dropped because our
  # only direct Go dep (golang.org/x/term) and its transitive (x/sys)
  # are pinned in lockstep with the project's Go floor; Dependabot
  # bumps to "latest" force the go directive past 1.23 and break
  # compatibility. govulncheck still scans the dep graph for actual
  # vulnerabilities; routine version churn we handle manually.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: '06:00'
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      gh-actions:
        patterns:
          - '*'
