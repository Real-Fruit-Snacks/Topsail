version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      go-deps:
        patterns:
          - '*'
    ignore:
      # Pinned in lockstep with the project's Go floor (currently 1.23).
      # Bump x/term manually when bumping the Go directive in go.mod and
      # the matrix in ci.yml.
      - dependency-name: golang.org/x/term
      - dependency-name: golang.org/x/sys

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      gh-actions:
        patterns:
          - '*'
