<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180" role="img" aria-label="topsail">
  <title>topsail</title>
  <desc>The topsail logo: a stylized mast with a highlighted topsail above a muted mainsail, beside the "topsail" wordmark and tagline.</desc>

  <!-- Mast and sails -->
  <g transform="translate(28 22)">
    <!-- Mast -->
    <line x1="24" y1="0" x2="24" y2="132" stroke="#0091B3" stroke-width="3.2" stroke-linecap="round"/>
    <!-- Yard (topsail spar) -->
    <line x1="6" y1="6" x2="42" y2="6" stroke="#0091B3" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Topsail (highlighted; this is the named sail) -->
    <path d="M 26 8 L 26 58 L 104 36 Z" fill="#0091B3"/>
    <!-- Mainsail (muted to keep visual emphasis on the topsail) -->
    <path d="M 26 66 L 26 130 L 124 106 Z" fill="#0091B3" fill-opacity="0.32"/>
    <!-- Waterline -->
    <path d="M -4 138 Q 70 144 144 138" stroke="#0091B3" stroke-width="1.6" fill="none" stroke-opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(176 0)">
    <text x="0" y="92"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace"
          font-size="68"
          font-weight="700"
          fill="#1F2937">topsail</text>
    <text x="3" y="128"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="18"
          fill="#6B7280">84 Unix utilities · one static Go binary · everywhere</text>
  </g>
</svg>
