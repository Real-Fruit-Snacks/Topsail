version: 2

project_name: topsail

before:
  hooks:
    - go mod tidy
    # Generate shell completions and man pages, then bundle them into
    # each archive (see `archives.files` below).
    - go run ./cmd/gendocs -out build/docs

builds:
  - id: topsail
    main: ./cmd/topsail
    binary: topsail
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/Real-Fruit-Snacks/topsail/internal/cli.Version={{.Version}}
      - -X github.com/Real-Fruit-Snacks/topsail/internal/cli.Commit={{.Commit}}
      - -X github.com/Real-Fruit-Snacks/topsail/internal/cli.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  # Drop the version from the archive name so the
  # https://github.com/.../releases/latest/download/topsail_<os>_<arch>.tar.gz
  # URL pattern works regardless of the current latest tag.
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - src: build/docs/completions/*
        dst: completions
      - src: build/docs/man/*
        dst: man

# Linux distribution packages for users who prefer dpkg/rpm/apk over
# tarballs. Packages bundle the binary, man pages, and shell completions
# in their canonical filesystem locations.
nfpms:
  - id: linux-packages
    package_name: topsail
    vendor: Real-Fruit-Snacks
    homepage: https://github.com/Real-Fruit-Snacks/topsail
    maintainer: Real-Fruit-Snacks <noreply@github.com>
    description: |-
      A BusyBox-style multi-call binary in Go.
      74 Unix utilities, one statically-linked executable.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: build/docs/man/*.1
        dst: /usr/share/man/man1/
      - src: build/docs/completions/topsail.bash
        dst: /usr/share/bash-completion/completions/topsail
      - src: build/docs/completions/_topsail
        dst: /usr/share/zsh/site-functions/_topsail
      - src: build/docs/completions/topsail.fish
        dst: /usr/share/fish/vendor_completions.d/topsail.fish

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'

sboms:
  - id: archive
    artifacts: archive

signs:
  - id: checksum
    cmd: cosign
    # cosign v3 produces a Sigstore bundle (signature + certificate +
    # Rekor inclusion proof) in one self-contained .sigstore.json file.
    # The legacy --output-certificate / --output-signature pair was
    # removed in v3.0.0; --bundle is the supported replacement.
    signature: '${artifact}.sigstore.json'
    args:
      - sign-blob
      - '--bundle=${signature}'
      - '${artifact}'
      - '--yes'
    artifacts: checksum
    output: true

release:
  github:
    owner: Real-Fruit-Snacks
    name: topsail
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## topsail {{ .Tag }}

    Single-file BusyBox-like multi-call binary, in Go.
  footer: |
    **Verifying signatures (cosign keyless):**

    ```bash
    cosign verify-blob \
      --bundle checksums.txt.sigstore.json \
      --certificate-identity-regexp 'https://github.com/Real-Fruit-Snacks/topsail/.*' \
      --certificate-oidc-issuer    https://token.actions.githubusercontent.com \
      checksums.txt
    ```
